<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">Multi-Layer Perceptron for Iris Classification</text>
  
  <!-- Layer Labels -->
  <text x="120" y="70" font-family="Arial" font-size="18" text-anchor="middle" fill="#333">Input Layer</text>
  <text x="400" y="70" font-family="Arial" font-size="18" text-anchor="middle" fill="#333">Hidden Layer</text>
  <text x="680" y="70" font-family="Arial" font-size="18" text-anchor="middle" fill="#333">Output Layer</text>
  
  <!-- Input Layer Nodes -->
  <circle cx="120" cy="150" r="30" fill="#6eb5ff" stroke="#3f87e5" stroke-width="2"/>
  <circle cx="120" cy="230" r="30" fill="#6eb5ff" stroke="#3f87e5" stroke-width="2"/>
  <circle cx="120" cy="310" r="30" fill="#6eb5ff" stroke="#3f87e5" stroke-width="2"/>
  <circle cx="120" cy="390" r="30" fill="#6eb5ff" stroke="#3f87e5" stroke-width="2"/>
  
  <!-- Input Node Labels -->
  <text x="120" y="155" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">x₁</text>
  <text x="120" y="235" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">x₂</text>
  <text x="120" y="315" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">x₃</text>
  <text x="120" y="395" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">x₄</text>
  
  <!-- Input Feature Descriptions -->
  <rect x="10" y="135" width="85" height="30" rx="5" ry="5" fill="#e6f3ff" stroke="#3f87e5" stroke-width="1"/>
  <rect x="10" y="215" width="85" height="30" rx="5" ry="5" fill="#e6f3ff" stroke="#3f87e5" stroke-width="1"/>
  <rect x="10" y="295" width="85" height="30" rx="5" ry="5" fill="#e6f3ff" stroke="#3f87e5" stroke-width="1"/>
  <rect x="10" y="375" width="85" height="30" rx="5" ry="5" fill="#e6f3ff" stroke="#3f87e5" stroke-width="1"/>
  
  <text x="52" y="155" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">Sepal Length</text>
  <text x="52" y="235" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">Sepal Width</text>
  <text x="52" y="315" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">Petal Length</text>
  <text x="52" y="395" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">Petal Width</text>
  
  <!-- Example Input Values -->
  <rect x="170" y="135" width="60" height="30" rx="5" ry="5" fill="#d1e7ff" stroke="#3f87e5" stroke-width="1"/>
  <rect x="170" y="215" width="60" height="30" rx="5" ry="5" fill="#d1e7ff" stroke="#3f87e5" stroke-width="1"/>
  <rect x="170" y="295" width="60" height="30" rx="5" ry="5" fill="#d1e7ff" stroke="#3f87e5" stroke-width="1"/>
  <rect x="170" y="375" width="60" height="30" rx="5" ry="5" fill="#d1e7ff" stroke="#3f87e5" stroke-width="1"/>
  
  <text x="200" y="155" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">5.1 cm</text>
  <text x="200" y="235" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">3.5 cm</text>
  <text x="200" y="315" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">1.4 cm</text>
  <text x="200" y="395" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">0.2 cm</text>
  
  <!-- Hidden Layer Nodes -->
  <circle cx="400" cy="170" r="30" fill="#ff9e6e" stroke="#e57e3f" stroke-width="2"/>
  <circle cx="400" cy="250" r="30" fill="#ff9e6e" stroke="#e57e3f" stroke-width="2"/>
  <circle cx="400" cy="330" r="30" fill="#ff9e6e" stroke="#e57e3f" stroke-width="2"/>
  <circle cx="400" cy="410" r="30" fill="#ff9e6e" stroke="#e57e3f" stroke-width="2"/>
  
  <!-- Hidden Node Labels -->
  <text x="400" y="175" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">h₁</text>
  <text x="400" y="255" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">h₂</text>
  <text x="400" y="335" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">h₃</text>
  <text x="400" y="415" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">h₄</text>
  
  <!-- Hidden Layer Calculations -->
  <rect x="450" y="155" width="120" height="30" rx="5" ry="5" fill="#ffe6d5" stroke="#e57e3f" stroke-width="1"/>
  <rect x="450" y="235" width="120" height="30" rx="5" ry="5" fill="#ffe6d5" stroke="#e57e3f" stroke-width="1"/>
  <rect x="450" y="315" width="120" height="30" rx="5" ry="5" fill="#ffe6d5" stroke="#e57e3f" stroke-width="1"/>
  <rect x="450" y="395" width="120" height="30" rx="5" ry="5" fill="#ffe6d5" stroke="#e57e3f" stroke-width="1"/>
  
  <text x="510" y="175" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">0.83 (ReLU)</text>
  <text x="510" y="255" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">0.21 (ReLU)</text>
  <text x="510" y="335" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">0.05 (ReLU)</text>
  <text x="510" y="415" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">0.47 (ReLU)</text>
  
  <!-- Output Layer Nodes -->
  <circle cx="680" cy="210" r="30" fill="#85ff6e" stroke="#55e53f" stroke-width="2"/>
  <circle cx="680" cy="290" r="30" fill="#85ff6e" stroke="#55e53f" stroke-width="2"/>
  <circle cx="680" cy="370" r="30" fill="#85ff6e" stroke="#55e53f" stroke-width="2"/>
  
  <!-- Output Node Labels -->
  <text x="680" y="215" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">y₁</text>
  <text x="680" y="295" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">y₂</text>
  <text x="680" y="375" font-family="Arial" font-size="14" text-anchor="middle" fill="#fff">y₃</text>
  
  <!-- Output Class Labels -->
  <rect x="720" y="195" width="70" height="30" rx="5" ry="5" fill="#d5ffe6" stroke="#55e53f" stroke-width="1"/>
  <rect x="720" y="275" width="70" height="30" rx="5" ry="5" fill="#d5ffe6" stroke="#55e53f" stroke-width="1"/>
  <rect x="720" y="355" width="70" height="30" rx="5" ry="5" fill="#d5ffe6" stroke="#55e53f" stroke-width="1"/>
  
  <text x="755" y="215" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Setosa</text>
  <text x="755" y="295" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Versicolor</text>
  <text x="755" y="375" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Virginica</text>
  
  <!-- Output Probabilities -->
  <rect x="720" y="225" width="70" height="20" rx="5" ry="5" fill="#c1f0d3" stroke="#55e53f" stroke-width="1"/>
  <rect x="720" y="305" width="70" height="20" rx="5" ry="5" fill="#c1f0d3" stroke="#55e53f" stroke-width="1"/>
  <rect x="720" y="385" width="70" height="20" rx="5" ry="5" fill="#c1f0d3" stroke="#55e53f" stroke-width="1"/>
  
  <text x="755" y="240" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">0.92</text>
  <text x="755" y="320" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">0.07</text>
  <text x="755" y="400" font-family="Arial" font-size="11" text-anchor="middle" fill="#333">0.01</text>
  
  <!-- Connections from Input to Hidden Layer (simplified) -->
  <line x1="150" y1="150" x2="370" y2="170" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="150" x2="370" y2="250" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="150" x2="370" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="150" x2="370" y2="410" stroke="#aaa" stroke-width="1.5"/>
  
  <line x1="150" y1="230" x2="370" y2="170" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="230" x2="370" y2="250" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="230" x2="370" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="230" x2="370" y2="410" stroke="#aaa" stroke-width="1.5"/>
  
  <line x1="150" y1="310" x2="370" y2="170" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="310" x2="370" y2="250" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="310" x2="370" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="310" x2="370" y2="410" stroke="#aaa" stroke-width="1.5"/>
  
  <line x1="150" y1="390" x2="370" y2="170" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="390" x2="370" y2="250" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="390" x2="370" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="150" y1="390" x2="370" y2="410" stroke="#aaa" stroke-width="1.5"/>
  
  <!-- Connections from Hidden to Output Layer (simplified) -->
  <line x1="430" y1="170" x2="650" y2="210" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="170" x2="650" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="170" x2="650" y2="370" stroke="#aaa" stroke-width="1.5"/>
  
  <line x1="430" y1="250" x2="650" y2="210" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="250" x2="650" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="250" x2="650" y2="370" stroke="#aaa" stroke-width="1.5"/>
  
  <line x1="430" y1="330" x2="650" y2="210" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="330" x2="650" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="330" x2="650" y2="370" stroke="#aaa" stroke-width="1.5"/>
  
  <line x1="430" y1="410" x2="650" y2="210" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="410" x2="650" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="430" y1="410" x2="650" y2="370" stroke="#aaa" stroke-width="1.5"/>
  
  <!-- Highlighted Connections -->
  <line x1="150" y1="310" x2="370" y2="170" stroke="#ff6b6b" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="150" y1="390" x2="370" y2="170" stroke="#ff6b6b" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="430" y1="170" x2="650" y2="210" stroke="#ff6b6b" stroke-width="3" stroke-opacity="0.7"/>
  
  <!-- Weight Labels for Highlighted Connections -->
  <text x="250" y="220" font-family="Arial" font-size="12" fill="#d63031" font-weight="bold">w = 0.72</text>
  <text x="250" y="260" font-family="Arial" font-size="12" fill="#d63031" font-weight="bold">w = 0.68</text>
  <text x="530" y="190" font-family="Arial" font-size="12" fill="#d63031" font-weight="bold">w = 0.85</text>
  
  <!-- Legend -->
  <rect x="10" y="470" width="140" height="120" fill="#fff" stroke="#333" stroke-width="1" rx="5" ry="5"/>
  <circle cx="25" cy="490" r="10" fill="#6eb5ff"/>
  <text x="45" y="495" font-family="Arial" font-size="12" fill="#333">Input Features</text>
  <circle cx="25" cy="520" r="10" fill="#ff9e6e"/>
  <text x="45" y="525" font-family="Arial" font-size="12" fill="#333">Hidden Neurons</text>
  <circle cx="25" cy="550" r="10" fill="#85ff6e"/>
  <text x="45" y="555" font-family="Arial" font-size="12" fill="#333">Output Classes</text>
  <line x1="15" y1="575" x2="35" y2="575" stroke="#ff6b6b" stroke-width="3"/>
  <text x="45" y="580" font-family="Arial" font-size="12" fill="#333">Strong Connections</text>
  
  <!-- Activation Function -->
  <rect x="250" y="500" width="280" height="80" fill="#fff" stroke="#333" stroke-width="1" rx="5" ry="5"/>
  <text x="390" y="520" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">Activation Functions:</text>
  <text x="390" y="545" font-family="Arial" font-size="13" text-anchor="middle" fill="#333">Hidden Layer: ReLU (max(0,x))</text>
  <text x="390" y="570" font-family="Arial" font-size="13" text-anchor="middle" fill="#333">Output Layer: Softmax (for probabilities)</text>
  
  <!-- Decision Box -->
  <rect x="550" y="500" width="240" height="80" fill="#d9f5d6" stroke="#55e53f" stroke-width="2" rx="10" ry="10"/>
  <text x="670" y="525" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="#333">Decision: Iris-setosa</text>
  <text x="670" y="550" font-family="Arial" font-size="13" text-anchor="middle" fill="#333">(92% confidence)</text>
  <text x="670" y="570" font-family="Arial" font-size="13" text-anchor="middle" fill="#333">Based on highest probability</text>
</svg>
